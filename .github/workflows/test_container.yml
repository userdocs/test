name: test contianer
on:
  workflow_dispatch:
jobs:
  build:
    name: OS test
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    container:
      image: ubuntu:hirsute
    steps:
      - uses: actions/checkout@v2.3.4
      - run: apt-get update
      - run: apt-get get upgrade
      - run: apt-get install qtbase5-dev qttools5-dev boost-dev
      - run: echo "all done"
