name: multi aarch64
on:
  workflow_dispatch:
jobs:
  build:
    name: aarch64
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    container:
      image: alpine:latest
    strategy:
      fail-fast: false
      matrix:
        arch_type: [aarch64]
        libtorrent_version: ["1.2", "2.0"]
        with_icu: ["", -i]
        build_tool: ["", cmake]
        include:
          - build_tool: cmake
            build_tool_name: cmake-
          - with_icu: "-i"
            with_icu_name: icu-
            with_icu_command: bash qbittorrent-nox-static.sh icu
    env:
      qbt_build_tool: ""
      qbt_cross_name: aarch64

    steps:
      - uses: actions/checkout@v2.3.4

      - run: apk add bash
        shell: ash {0}

      - run: bash qbittorrent-nox-static.sh -bs-ma

      - run: bash qbittorrent-nox-static.sh libexecinfo

      - run: bash qbittorrent-nox-static.sh iconv

      - run: bash qbittorrent-nox-static.sh zlib

      - run: bash qbittorrent-nox-static.sh iconv

      - run: bash qbittorrent-nox-static.sh openssl

      - run: "${{ matrix.with_icu_command }}"

      - run: bash qbittorrent-nox-static.sh boost

      - run: bash qbittorrent-nox-static.sh libtorrent

      # - run: bash qbittorrent-nox-static.sh libtorrent -pr userdocs/qbittorrent-nox-static

      - run: bash qbittorrent-nox-static.sh ${{ matrix.with_icu }} qtbase

      - run: bash qbittorrent-nox-static.sh qttools

      - run: bash qbittorrent-nox-static.sh qbittorrent

      # - run: bash qbittorrent-nox-static.sh qbittorrent -pr userdocs/qbittorrent-nox-static

      - name: Archive code coverage results
        uses: actions/upload-artifact@v2.2.3
        with:
          name: ${{ matrix.arch_type }}-${{ matrix.build_tool }}${{ matrix.with_icu_name }}lt-v${{ matrix.libtorrent_version }}-qbittorrent-nox
          path: qbt-build/completed/qbittorrent-nox
