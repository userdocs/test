name: test
on:
  - workflow_dispatch
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2.3.4

      - name: Docker multiarch bootstrap
        run: |
          mkdir -p build
          touch build/test.txt

      - name: Create deb packages
        uses: jiro4989/build-deb-action@v2
        with:
          package: test
          package_root: build
          maintainer: userdocs
          version: ""
          depends: ""
          arch: amd64
          desc: test
